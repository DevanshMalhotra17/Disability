<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus — Communication Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="logo.png">
</head>

<body>
<section id="screen-learn" class="screen active">
        <div class="grain"></div>
        <header class="sl-header">
            <button class="back-btn" id="learn-back-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                Back
            </button>
            <div class="sl-logo">
                <img src="logo.png" alt="Nexus Logo" style="height: 24px; width: auto; margin-right: 10px;">
                <span class="sl-logo-text">Nexus</span>
            </div>
        </header>

        <main class="live-main">
            <div style="text-align:center; padding: 20px 0;">
                <h2 style="font-family: var(--font-head); font-size: 28px; margin-bottom: 5px;">Show me: <span id="target-sign" style="color: var(--gold);">Thumb Up</span></h2>
                <p id="tutor-scenario" style="color: #ccc; font-style: italic; font-size: 16px; max-width: 80%; margin: 0 auto 10px auto; min-height: 1.2em;">Loading dynamic lesson...</p>
                <p id="learn-status" style="color: #888; font-size: 14px;">Waiting for camera...</p>
            </div>
            
            <div class="live-camera-wrap" style="flex: 1; max-height: 50vh;">
                <video id="learn-camera-feed" class="camera-feed" autoplay playsinline muted></video>
                <div class="camera-overlay">
                    <div class="focus-brackets">
                        <div class="bracket tl"></div><div class="bracket tr"></div>
                        <div class="bracket bl"></div><div class="bracket br"></div>
                    </div>
                </div>
            </div>
            
            <div style="display:flex; justify-content:center; padding: 30px;">
                <button class="sl-btn" id="next-sign-btn" style="width: 100%;">Skip Sign</button>
            </div>
        </main>
    </section>
<script src="config.js"></script>
    <script src="asl.js"></script>
    <script type="module">
        import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
        window.GestureRecognizer = GestureRecognizer;
        window.FilesetResolver = FilesetResolver;
    </script>
    <script src="main.js"></script>
</body>

</html>
