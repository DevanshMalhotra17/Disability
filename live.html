<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SightLine — Communication Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
<section id="screen-live" class="screen active">
        <video id="camera-feed" autoplay playsinline muted></video>
        <canvas id="capture-canvas" style="display:none;"></canvas>

        <!-- Dark overlay gradient -->
        <div class="live-overlay"></div>

        <!-- Top bar -->
        <div class="live-top">
            <button class="live-back-btn" id="live-back-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </button>

            <div class="live-mode-badge">
                <span class="live-mode-dot"></span>
                <span id="mode-label" class="live-mode-text">UNIVERSAL BRIDGE</span>
            </div>

            <button class="live-settings-btn" id="settings-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
            </button>
        </div>

        <!-- Scan corners -->
        <div class="scan-frame">
            <span class="sf-corner sf-tl"></span>
            <span class="sf-corner sf-tr"></span>
            <span class="sf-corner sf-bl"></span>
            <span class="sf-corner sf-br"></span>
        </div>

        <!-- Translation output -->
        <div id="narration-bar" class="narration-bar" aria-live="polite">
            <span class="nb-label">Translation</span>
            <p id="narration-text" class="nb-text">Ready to translate...</p>
        </div>

        <!-- Large display for deaf/mute to read -->
        <div id="text-display" class="text-display hidden" aria-live="polite">
            <div id="asl-display" class="asl-display"></div>
            <p id="display-text" class="display-text"></p>
        </div>

        <!-- Type input for mute -->
        <div id="type-input-area" class="type-input-area hidden">
            <textarea id="type-input" class="type-input" placeholder="Type your message here…" rows="2"></textarea>
            <button id="speak-typed-btn" class="speak-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
                </svg>
                Speak
            </button>
        </div>

        <!-- Central action -->
        <div class="live-bottom">
            <button id="action-btn" class="action-btn">
                <div class="action-ring"></div>
                <div class="action-ring action-ring-2"></div>
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            </button>
            <span class="action-label">Capture</span>
        </div>

        <!-- Status -->
        <div class="live-status">
            <span class="status-dot"></span>
            <span id="status-label">Phone Camera</span>
        </div>
    </section>
<script src="config.js"></script>
    <script src="asl.js"></script>
    <script type="module">
        import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
        window.GestureRecognizer = GestureRecognizer;
        window.FilesetResolver = FilesetResolver;
    </script>
    <script src="main.js"></script>
</body>

</html>
