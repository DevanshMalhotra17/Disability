<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SightLine — Communication Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
<section id="screen-setup" class="screen active">
        <div class="grain"></div>

        <header class="sl-header">
            <div class="sl-logo">
                <svg class="sl-logo-eye" width="28" height="18" viewBox="0 0 28 18" fill="none">
                    <path d="M1 9C5 2 10 0 14 0C18 0 23 2 27 9C23 16 18 18 14 18C10 18 5 16 1 9Z" stroke="currentColor"
                        stroke-width="1.2" fill="none" />
                    <circle cx="14" cy="9" r="3.5" stroke="currentColor" stroke-width="1.2" fill="none" />
                    <circle cx="14" cy="9" r="1.2" fill="currentColor" />
                </svg>
                <span class="sl-logo-text">SightLine</span>
            </div>
            <span class="sl-version">v2.1</span>
        </header>

        <main class="setup-main">
            <div class="setup-hero">
                <div class="hero-tag">Accessibility Bridge</div>
                <h1 class="hero-headline">
                    Every voice<br />
                    <em>deserves</em> to<br />
                    be heard.
                </h1>
                <p class="hero-sub">
                    Real-time translation between sign language,<br />
                    speech, and text. Connect with anyone.
                </p>
            </div>

            <div class="setup-card">
                <p class="card-question">Do you have the SightLine handheld device?</p>
                <div class="card-choices">
                    <button class="choice-btn choice-secondary" id="use-pi-btn">
                        <div class="choice-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <rect x="5" y="2" width="14" height="20" rx="2" />
                                <line x1="12" y1="18" x2="12" y2="18.01" stroke-width="2" stroke-linecap="round" />
                            </svg>
                        </div>
                        <div class="choice-text">
                            <span class="choice-label">Connect Pi</span>
                            <span class="choice-desc">Use handheld hardware</span>
                        </div>
                        <span class="choice-arrow">↗</span>
                    </button>

                    <button class="choice-btn choice-primary" id="use-phone-btn">
                        <div class="choice-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </div>
                        <div class="choice-text">
                            <span class="choice-label">Use This Phone</span>
                            <span class="choice-desc">Camera &amp; mic on device</span>
                        </div>
                        <span class="choice-arrow">↗</span>
                    </button>

                    <button class="choice-btn choice-secondary" id="learn-asl-btn" style="margin-top: 10px;">
                        <div class="choice-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
                            </svg>
                        </div>
                        <div class="choice-text">
                            <span class="choice-label">Learn ASL</span>
                            <span class="choice-desc">Interactive tutor</span>
                        </div>
                        <span class="choice-arrow">↗</span>
                    </button>
                </div>
            </div>

            <div class="setup-footnote">
                <span class="footnote-pill">ASL</span>
                <span class="footnote-pill">Speech-to-Text</span>
                <span class="footnote-pill">Scene Description</span>
                <span class="footnote-pill">Text-to-Speech</span>
            </div>
        </main>
    </section>
<script src="asl.js"></script>
    <script type="module">
        import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
        window.GestureRecognizer = GestureRecognizer;
        window.FilesetResolver = FilesetResolver;
    </script>
    <script src="main.js"></script>
</body>

</html>
