<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SightLine — Communication Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
<section id="screen-identity2" class="screen active">
        <div class="grain"></div>
        <header class="sl-header">
            <button class="back-btn" id="id2-back-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                Back
            </button>
            <div class="sl-logo">
                <svg class="sl-logo-eye" width="22" height="14" viewBox="0 0 28 18" fill="none">
                    <path d="M1 9C5 2 10 0 14 0C18 0 23 2 27 9C23 16 18 18 14 18C10 18 5 16 1 9Z" stroke="currentColor" stroke-width="1.2" fill="none" />
                    <circle cx="14" cy="9" r="3.5" stroke="currentColor" stroke-width="1.2" fill="none" />
                    <circle cx="14" cy="9" r="1.2" fill="currentColor" />
                </svg>
                <span class="sl-logo-text">SightLine</span>
            </div>
        </header>

        <main class="mode-main">
            <div class="mode-heading">
                <span class="mode-step">02 / Setup</span>
                <h2 class="mode-title">Who are you<br />talking to?</h2>
            </div>

            <div class="mode-list">
                <button class="mode-item id2-btn" data-id="hearing" id="id2-hearing">
                    <div class="mode-num">01</div>
                    <div class="mode-glyph">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="22"/>
                        </svg>
                    </div>
                    <div class="mode-info">
                        <h3 class="mode-name">Hearing / Speaking</h3>
                        <p class="mode-desc">They have no disabilities.</p>
                    </div>
                </button>

                <button class="mode-item id2-btn" data-id="deaf" id="id2-deaf">
                    <div class="mode-num">02</div>
                    <div class="mode-glyph">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3.5 3.5 0 1 1-7 0" />
                            <path d="M15 8.5a2.5 2.5 0 0 0-5 0v1a2 2 0 1 1 0 4" />
                        </svg>
                    </div>
                    <div class="mode-info">
                        <h3 class="mode-name">Deaf Person</h3>
                        <p class="mode-desc">They use Sign Language.</p>
                    </div>
                </button>

                <button class="mode-item id2-btn" data-id="mute" id="id2-mute">
                    <div class="mode-num">03</div>
                    <div class="mode-glyph">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2" ry="2" />
                            <path d="M6 8h.01" /><path d="M10 8h.01" /><path d="M14 8h.01" /><path d="M18 8h.01" /><path d="M8 12h.01" /><path d="M12 12h.01" /><path d="M16 12h.01" /><path d="M7 16h10" />
                        </svg>
                    </div>
                    <div class="mode-info">
                        <h3 class="mode-name">Mute Person</h3>
                        <p class="mode-desc">They type to communicate.</p>
                    </div>
                </button>

                <button class="mode-item id2-btn" data-id="blind" id="id2-blind">
                    <div class="mode-num">04</div>
                    <div class="mode-glyph">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </div>
                    <div class="mode-info">
                        <h3 class="mode-name">Blind Person</h3>
                        <p class="mode-desc">They rely on audio feedback.</p>
                    </div>
                </button>
            </div>
        </main>
    </section>
<script src="config.js"></script>
    <script src="asl.js"></script>
    <script type="module">
        import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
        window.GestureRecognizer = GestureRecognizer;
        window.FilesetResolver = FilesetResolver;
    </script>
    <script src="main.js"></script>
</body>

</html>
